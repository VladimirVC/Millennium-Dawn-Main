 IND_soldier2: "Создает §Y2 Механизированные дивизии§! В Западной Яве"
 IND_soldier3: "Создает §Y2 Подразделения специального назначения§! В Западной Яве"
 indonesian_caliphate: "Индонезийский халифат расширяется!"
 indonesia_confront_australia_threat: "Индонезия угрожает Австралии из-за Тимора-Лешти!"
 IND_our_policies_tt: "Мы должны завершить либо §Y$IND_new_capital$§! или §Y$IND_new_silkroad$§!"
 IND_grasberg_mine_exploitation: "Эксплуатация рудника Грасберг"
 IND_grasberg_mine_exploitation_desc: "Шахта Грасберг в Западном Папуа является одной из крупнейших в мире золото-медных шахт. Мы должны расширять и разрабатывать резервы в этом районе, чтобы лучше вывести Индонезию на рынок драгоценных металлов."
 IND_separate_school: "Отдельные школы для мальчиков и девочек"
 IND_separate_school_desc: "Наши ученики будут отвлекаться, глядя друг на друга в классе. Мы должны построить новые, отдельные школы для мальчиков и девочек."
 IND_dont_separate_school: "Мальчики и девочки в одной школе"
 IND_dont_separate_school_desc: "Несмотря на призывы консерваторов к раздельным школам, было бы глупо уступать их требованиям. Если мы построим новые школы, это приведет к увеличению долга и задержит обучение наших студентов!"
 IND_dem_entrepreneur: "Фонд предпринимательства"
 IND_dem_entrepreneur_desc: "В условиях все более цифровизированного мира важно финансировать предпринимательство, чтобы наши люди могли вывести Индонезию на уровень остального мира."
 IND_equal_opportunities: "Равные возможности"
 IND_equal_opportunities_desc: "Равная возможность — это не то, чем многие могут похвастаться, особенно здесь, в Индонезии. Однако мы можем это изменить, предоставляя людям земельные участки."
 IND_reparations_give: "Дать репарации"
 IND_reparations_give_desc: "Давайте выплатим семьям добровольцев финансовую компенсацию в знак извинения, а также для улучшения имиджа нашей страны."
 IND_demand_reparations: "Требовать возмещения ущерба"
 IND_demand_reparations_desc: "Семьи наших мужчин и женщин нуждаются в немедленной финансовой компенсации. Если мы не получим эту компенсацию, мы заберем ее силой..."
 IND_crackdown_counterfeit: "Борьба с контрафактной продукцией"
 IND_crackdown_counterfeit_desc: "В нашей стране широко распространены фальшивые купюры. Это плохо сказывается на нашей экономике. Поэтому мы должны начать бороться с этой практикой и постепенно приближаться к экономическому восстановлению."
 IND_counterfeit: "Методы подделки"
 IND_counterfeit_desc: "Небольшое количество подделок не повредит нашей стране. Пока наши люди не протестуют и довольны, то и наши карманы тоже довольны."
 IND_batam_sez: "Особая экономическая зона Батам"
 IND_batam_sez_desc: "Остров Батам расположен на стратегическом перекрестке между Сингапуром и индонезийским архипелагом. Объявив его особой экономической зоной с налоговыми льготами и упрощенными правилами, мы сможем привлечь производителей электроники и создать высокотехнологичный промышленный кластер."
 IND_nickel_processing: "Инициатива по переработке никеля"
 IND_nickel_processing_desc: "Индонезия обладает крупнейшими в мире запасами никеля, однако большую его часть мы экспортируем в виде необработанной руды. Политика развития переработки никеля обяжет к внутренней переработке, создавая отрасли с высокой добавленной стоимостью в производстве материалов для аккумуляторов и нержавеющей стали."
 IND_semiconductor_fab: "Производство полупроводников"
 IND_semiconductor_fab_desc: "Благодаря растущему сектору электроники в Батаме и производству обработанного никеля для перспективных материалов, мы готовы создать свой первый завод по производству полупроводников. Это важный шаг на пути к технологической самодостаточности."
 IND_pt_pindad_modernize: "PT Pindad Modernization"
 IND_pt_pindad_modernize_desc: "PT Pindad, our state-owned defense manufacturer, has produced small arms and armored vehicles for the TNI for decades. Integrating domestic semiconductor components will reduce our reliance on foreign arms imports."
 IND_pt_di_aerospace: "PT Dirgantara Indonesia"
 IND_pt_di_aerospace_desc: "PT Dirgantara Indonesia is our national aerospace company with decades of aircraft assembly experience. Investing in advanced composite materials and domestically produced avionics will revitalize the company."
 IND_korean_chip_partnership: "Корейское партнерство в области полупроводников"
 IND_korean_chip_partnership_desc: "Южная Корея является мировым лидером в производстве полупроводников. Партнерство с корейскими компаниями могло бы ускорить развитие наших производственных мощностей по выпуску микросхем и обеспечить доступ к передовым технологиям изготовления."
 IND_taiwan_chip_partnership: "Соглашение о партнерстве с TSMC"
 IND_taiwan_chip_partnership_desc: "Компания Taiwan Semiconductor Manufacturing Company (TSMC) — крупнейший в мире производитель микросхем. Партнерство с TSMC привнесет в нашу зарождающуюся полупроводниковую промышленность беспрецедентный опыт, что принесет пользу обеим странам."
 IND_defense_industrial_base: "Интегрированная оборонно-промышленная база"
 IND_defense_industrial_base_desc: "Кульминация нашей промышленной стратегии: интегрированная оборонно-промышленная база, объединяющая переработку никеля, производство полупроводников и модернизированные государственные предприятия в самоподдерживающуюся экосистему."
 indonesia.17.t: "Индонезия предлагает партнерство в полупроводниковой отрасли."
 indonesia.17.d: "Индонезийские чиновники обратились к нам с предложением о создании совместного предприятия по производству полупроводников. Они стремятся использовать наш опыт в производстве микросхем для развития собственной отечественной промышленности и готовы вложить значительные средства в это сотрудничество."
 indonesia.17.a: "Это может быть взаимовыгодно."
 indonesia.17.b: "В настоящий момент нас это не интересует."
 indonesia.170.t: "Южная Корея принимает предложение о партнерстве!"
 indonesia.170.d: "Правительство Южной Кореи одобрило наше предложение о партнерстве в полупроводниковой отрасли. Южнокорейские компании поделятся своим опытом в области производства с нашими предприятиями в Батаме, и обе страны выиграют от более тесных экономических связей."
 indonesia.170.a: "Перспективное решение."
 indonesia.1700.t: "Южная Корея отказалась от партнерства."
 indonesia.1700.d: "Правительство Южной Кореи отклонило наше предложение о партнерстве в полупроводниковой отрасли. Это стало препятствием для наших амбиций в производстве микросхем."
 indonesia.1700.a: "Мы найдем другой способ."
 indonesia.18.t: "Индонезия предлагает партнерство с TSMC."
 indonesia.18.d: "Индонезия обратилась к нам с предложением о создании совместного производственного соглашения с компанией TSMC на базе их новых полупроводниковых заводов в Батаме. Эта сделка позволит расширить производственные мощности TSMC в Юго-Восточной Азии и одновременно будет способствовать развитию индонезийской индустрии микросхем."
 indonesia.18.a: "Компания TSMC получит выгоду от этого расширения."
 indonesia.18.b: "Мы должны отклонить это предложение."
 indonesia.180.t: "Тайвань принимает предложение о партнерстве с TSMC!"
 indonesia.180.d: "Власти Тайваня одобрили наше предложение о партнерстве с TSMC. Ведущий мировой производитель микросхем теперь будет сотрудничать с нашими полупроводниковыми предприятиями в Батаме, предоставляя Индонезии передовые экспертные знания."
 indonesia.180.a: "Знаковое соглашение!"
 indonesia.1800.t: "Тайвань отказался от партнерства"
 indonesia.1800.d: "Власти Тайваня отклонили наше предложение о партнерстве с TSMC. Без их экспертных знаний реализовать наши амбиции в полупроводниковой отрасли будет гораздо сложнее."
 indonesia.1800.a: "Разочаровывающий результат"
 IND_maluku_back_christians: "Вернуть христиан!"
 IND_maluku_back_christians_desc: "Мы должны поддержать наше обделенное вниманием христианское население. Это самое меньшее, что мы можем для них сделать в эти трудные времена."
 IND_national_awakening: "Программа Партии национального пробуждения"
 IND_national_awakening_desc: "Партия национального пробуждения, консервативная индонезийская политическая партия, вновь вышла на политическую арену. Как она будет действовать на этот раз, покажет время."
 IND_parliament_stormed: "Парламент штурмовали!"
 IND_parliament_stormed_desc: "Здание парламента было захвачено штурмом, и несколько ключевых чиновников взяты в плен. Они требуют их отставки, чтобы обрести свободу."
 IND_purify_philippines: "Очистите Филиппины"
 IND_purify_philippines_desc: "Давайте двинемся на север, на Филиппины. Хотя они и не являются исламской страной, это не значит, что они не могут ею стать!"
 indonesia.15.t: "Индонезия предлагает 10 принципов Бандунга."
 indonesia.15.d: "Индонезийские дипломаты обратились к нам с предложением, основанным на принципах исторической Бандунгской конференции. Они просят нас заключить пакт о взаимном ненападении и невмешательстве во внутренние дела друг друга. Это могло бы значительно укрепить китайско-индонезийские отношения."
 indonesia.15.a: "Мы согласны с этими принципами."
 indonesia.15.b: "Нас не интересует подобное соглашение."
 indonesia.150.t: "Китай признает Бандунгские принципы!"
 indonesia.150.d: "Правительство Китая согласилось с 10 принципами Бандунга. Был подписан пакт о ненападении, и обе страны обязались уважать суверенитет и внутренние дела друг друга."
 indonesia.150.a: "Исторический момент для единства Азии."
 indonesia.1500.t: "Китай отвергает Бандунгские принципы"
 indonesia.1500.d: "Правительство Китая отклонило наше предложение о заключении пакта о ненападении на основе Бандунгских принципов. Это дипломатический удар, который может обострить наши отношения с Пекином."
 indonesia.1500.a: "Разочаровывающий результат"
 indonesia.16.t: "Индонезия добивается дипломатической встречи"
 indonesia.16.d: "Правительство Индонезии запросило официальную встречу наших министров для урегулирования оставшихся разногласий и заключения пакта о ненападении. Учитывая нашу недавнюю историю, это может стать важным шагом на пути к прочному миру в регионе."
 indonesia.16.a: "Мы приветствуем эти дипломатические усилия."
 indonesia.16.b: "В настоящий момент нас это не интересует."
 indonesia.160.t: "Австралия согласилась на встречу!"
 indonesia.160.d: "Правительство Австралии приняло наше приглашение на официальную дипломатическую встречу. Подписан пакт о ненападении, и обе страны с нетерпением ожидают начала новой эры сотрудничества."
 indonesia.160.a: "Отличные новости!"
 indonesia.1600.t: "Австралия отказалась от встречи."
 indonesia.1600.d: "Правительство Австралии отклонило нашу просьбу о проведении официальной дипломатической встречи. Это стало препятствием на пути к нормализации отношений с Канберрой."
 indonesia.1600.a: "Мы будем помнить об этом."