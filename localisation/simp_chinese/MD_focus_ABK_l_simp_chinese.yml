 abkh.2.d: "阿布哈兹提议与我方建立小独联体军事同盟，我们是否同意这种伙伴关系？"
 abkh.2.a: "我们同意"
 abkh.2.b: "我们拒绝"
 abkh.3.t: "来自阿布哈兹的国际纵队 - “第15旅”"
 abkh.3.d: "阿布哈兹志愿者组建了一支旅，随后来自独联体各国的许多热心人士也加入了这支旅。现在，他们正与我们并肩作战。"
 abkh.3.a: "万岁"
