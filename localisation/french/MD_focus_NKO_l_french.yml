 korea.52.t: "Moderniser nos centres d'approvisionnement déficients"
 korea.52.d: "Notre grand dirigeant a fourni des fonds pour construire davantage de voies ferrées et un centre d’approvisionnement et ils nous ont laissé le choix de nous concentrer soit sur nos ambitions en matière de zone économique, soit de préparer notre logistique à la guerre."
