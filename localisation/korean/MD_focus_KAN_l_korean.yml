l_korean:
 Kansas_focus: "캔자스 중점계통도"
 KAN_ideas_tribal_resistance_spirit: "부족 저항 정신"
 KAN_ideas_tribal_resistance_spirit_desc: "그들은 너무나 오랫동안 우리를 낙인찍고, 폄하하며, 무시해 왔습니다. 라코타 북부 정부는 자신들의 깃발 아래 있는 모든 이를 돌보기는커녕, 그들만의 파벌만 챙기는 가짜 정부에 불과합니다. 그러므로 우리는 봉기하여 진정으로 공정한 정부를 세울 것입니다. 우리 자신만을 위해서가 아니라, 더 낫고 더 자유로우며 더 공평한 삶을 영위하고자 하는 모든 이들을 위해서 말입니다."