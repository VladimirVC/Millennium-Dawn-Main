 SOV.Nat_Autocracy_wagner_desc: "傭兵的愛国主義 ｰ ワグネル党（ロシア語ローマ字表記：Partiya Wagnera）\n\n同党はプリゴジンの国内における影響力拡大の結果として結成された。ワグネルは、それを共有し、機関銃を手にロシアの利益を守る覚悟のある者たちすべてを集める軍国主義的イデオロギーへと変貌を遂げた。"
