 PUK.Autocracy: "£KUR_Autocracy_small (PUK) クルディスタン愛国同盟 - 独裁派"
 PUK.Autocracy_icon: "£KUR_Autocracy_small"
 PUK.Autocracy_desc: "独裁体制 - クルディスタン愛国同盟（クルド語ローマ字表記：Yekêtiy Niştîmaniy Kurdistan）は、クルディスタン民主党（KDP）の強力なバルザーニー家支配に対抗する、より左派的な選択肢として設立された折衷的なクルド政党である。イラク・クルド内戦終結後、イラク・クルディスタン南部を実質的に支配し、大規模なペシュメルガを掌握し続けている。クルド独立問題ではKDPより現実的な姿勢を保ち、KDPとイランの関係が冷え込む中、イランとの関係を強化している。"
 PUK.neutral_Social: "£KUR_oligarchism_small （PUK）クルディスタン愛国同盟"
 PUK.neutral_Social_desc: "クルディスタン愛国同盟（クルド語ローマ字表記：Yekêtiy Niştîmaniy Kurdistan）は、クルディスタン民主党（KDP）の強力なバルザーニー家支配に対抗する、より左派的な選択肢として設立された折衷的なクルド政党である。イラク・クルド内戦終結後、イラク・クルディスタン南部を実質的に支配し、大規模なペシュメルガを掌握し続けている。クルド独立問題ではKDPより現実的な姿勢を保ち、KDPとイランの関係が冷え込む中、イランとの関係を強化している。"
 IEK.Neutral_Muslim_Brotherhood: "£AFG_salafist_jihadism クルディスタン・イスラム運動"
