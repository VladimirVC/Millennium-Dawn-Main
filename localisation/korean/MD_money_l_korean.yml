 NET_MIGRATION_RATE_TT_DELAYED: "우리나라의 §Y현재 순이민율§!은 현재 국가에서 진행중인 §Y이민§!의 규모를 나타냅니다. 이는 국가 중점, 이념, 디시전, 이벤트와 더불어 §Y이민법§! 수준을 조정함에 따라 변동됩니다. 이 값은 §Y최대 이민율§!과 §Y순이민율 값의 요인§!에 의해 변동되는 §Y기본 순이민율§!을 곱하여 계산됩니다.\n\n법률, 국민정신 및 기술이 §Y기본 순이민율§!에 미치는 영향: [?modifier@base_migration_rate_value|+%0]\n법률, 국민정신 및 기술이 §Y순이민율 값의 요인§!에 미치는 영향: [?modifier@migration_rate_value_factor|+%0]"
