 IND_Aceh_insurgency_info: "Aceh est en désordre et en rébellion depuis 1976, ce qui entraîne une instabilité dans notre pays et des effusions de sang inutiles. Notre armée est trop concentrée sur la lutte contre ces insurgés, ce qui nous fait prendre du retard sur le plan militaire."
