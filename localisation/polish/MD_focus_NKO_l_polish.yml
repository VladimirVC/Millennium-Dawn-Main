 arduous_march_modifiers_desc: "Arduous March pobrał ciężkie żniwo od naszego narodu. Aby zabezpieczyć przyszłość naszego ludu, musimy wdrożyć strategiczne środki, aby przezwyciężyć ten okres trudności i poprowadzić nasz kraj ku dobrobytowi. Obejmuje to zwiększenie produkcji rolnej, zabezpieczenie pomocy humanitarnej i reformę naszej polityki wewnętrznej w celu zapewnienia stabilności i wzrostu."
