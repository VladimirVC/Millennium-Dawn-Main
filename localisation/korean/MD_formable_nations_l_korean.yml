l_korean:
 form_BLT_category: "발트의 통합"
 form_BLT_category_desc: "발트 3국은 에스토니아, 라트비아, 리투아니아 간의 국가 연합입니다. 이 세 국가는 오랫동안 유럽 지정학적 포식자들의 먹잇감이 되어 왔으며, 지금도 유럽 제국주의의 손아귀에서 고통받고 있습니다. 외국의 후원자들이 행사하는 영향력과 압력에 맞서 싸우는 것은 필수이자 최우선 과제입니다. 우리는 국가를 통합하고 하나로 뭉침으로써 이 목표를 달성할 수 있습니다. 외세의 압박을 버텨내고 다른 국가들이 함부로 유린하는 과속 방지턱이 아닌, 세계 무대의 당당한 일원으로 자리매김할 수 있는 하나의 인민으로 거듭나야 합니다."
 BLT_integrate_start: "[GetBLTNameDef] 형성 시작"
 BLT_integrate_start_desc: "발트 3국 연합을 결성할 때가 되었습니다.\n\n"
 BLT_integrate_LIT: "[GetBLTNameAdj] [LIT.GetAdjective] 영토 통합"
 BLT_integrate_LIT_desc: "리투아니아는 발트 3국 중 가장 큰 국가입니다. 인구, GDP, 국토 면적 등 대부분의 지표에서 라트비아와 에스토니아를 앞섭니다. 이 국가를 통합하려면 상당한 양의 자원이 소모되겠지만, 우리의 새로운 발트 국가에 큰 이득이 될 것입니다."
 BLT_integrate_LAT: "[GetBLTNameAdj] [LAT.GetAdjective] 영토 통합"
 BLT_integrate_LAT_desc: "라트비아 역시 발트 국가 중 하나입니다. 리투아니아와 에스토니아를 연결하며 매우 중요한 전략적 위치를 차지하고 있습니다. 이 국가를 통합하려면 상당한 양의 자원이 소모되겠지만, 우리의 새로운 발트 국가에 큰 이득이 될 것입니다."
 BLT_integrate_EST: "[GetBLTNameAdj] [EST.GetAdjective] 영토 통합"
 BLT_integrate_EST_desc: "에스토니아는 발트 3국 중 가장 작지만, 3국 중 가장 긴 해안선을 보유하고 있습니다. 경제 역시 주로 이 해안선과 임업에 기반을 두고 있습니다. 에스토니아 인민은 우리의 위대한 신생 국가에 훌륭한 힘을 보태줄 것입니다. 이 국가를 통합하려면 약간의 자원이 소모되겠지만, 우리의 새로운 발트 국가에 큰 이득이 될 것입니다."
 BLT_update_flag: "[GetBLTNameDef] 형성 완료"
 BLT_update_flag_desc: "모든 구성 영토가 통합됨에 따라, 우리는 변혁을 완수하고 [GetBLTNameDef]을(를) 선포하며 통합된 국기와 국명을 채택할 수 있습니다."
 form_FCA_category: "중앙아메리카 통합"
 form_FCA_category_desc: "중앙아메리카 연방공화국은 19세기 초에 존재했습니다. 이 연방은 누에바에스파냐의 구 과테말라 총독령 영토에 있던 국가들의 연합이었습니다. 코스타리카, 엘살바도르, 과테말라, 온두라스, 니카라과, 그리고 멕시코와 벨리즈의 일부 지역으로 구성되었습니다. 다양한 이념을 하나로 뭉쳐 연방을 재통합하는 것은 이 국가들에게 거대한 시험대가 될 것입니다."
