 IP_TITLE: "이념의 힘"
 IP_communist_category_desc: "[IP_communist_powers]"
 IP_socialist_category_desc: "[IP_socialist_powers]"
 IP_conservative_category_desc: "[IP_conservative_powers]"
 IP_liberal_category_desc: "[IP_liberal_powers]"
 IP_autocrat_category_desc: "[IP_autocrat_powers]"
 IP_monarchist_category_desc: "[IP_monarchist_powers]"
 IP_fundamentalist_symbol_desc: "[IP_fundamentalist_powers]"
 IP_communist_category_desc_delayed: "§L공산주의자들은 주로 마르크스-레닌주의나 유사한 이념의 형태를 따릅니다. 이들은 국가 주도 경제의 옹호자로서, 외국의 산업 자산을 국유화하거나 5개년 계획을 통해 더 쉽게 산업화를 이룩할 수 있습니다. 또한 스파이를 통해 자국의 이념을 더욱 효과적으로 퍼뜨릴 수 있습니다.§!"
 IP_socialist_category_desc_delayed: "§L사회주의자들은 시장 자본주의 및 국가 자본주의 요소와 진보주의를 결합합니다. 대개 국가 내부에 모든 정부의 노력을 쏟아붓는 데 초점을 맞춥니다. 사회주의자들은 복지 정책과 경제에 대한 정부 개입을 통해 자국의 내부 상황을 더 쉽게 개선할 수 있습니다.§!"
 IP_conservative_category_desc_delayed: "§L보수주의자들은 대개 국가가 지금 상태 그대로 유지되기를 원하며, 심지어 진보적인 법률을 되돌리려고도 합니다. 보수주의에는 종종 민족주의적 성향과 깊은 종교적 신념이 동반됩니다. 이러한 이유로 보수주의 국가에서는 급진적인 변화가 드물기 때문에 정치적, 국가적 안정도를 유지하기가 더 쉽습니다.§!"
 IP_liberal_category_desc_delayed: "§L자유주의자들은 자유의 이념을 촉진하는 경향이 있으며, 일부 정당은 다양한 문제에 대해 더 진보적인(사회자유주의적인) 접근 방식을 취합니다. 대부분의 자유주의 정당의 핵심에는 제한된 정부 개입을 바탕으로 한 자유 시장에 대한 개념이 자리 잡고 있습니다.§!"
 IP_autocrat_category_desc_delayed: "§L독재주의자들은 국가를 운영하기 위해 독재자의 힘에 의존합니다. 이 선동가들은 자신이 원하는 것을 얻기 위해 미심쩍은 수단과 뒷거래를 사용하는 것을 두려워하지 않습니다. 독재주의자들은 높은 부패를 더 쉽게 용인하고 철권통치로 국가에 대한 통제력을 굳건히 할 수 있습니다.§!"
 IP_monarchist_category_desc_delayed: "§L군주주의자들은 국가를 통치하기 위해 혈통과 영광에 의존합니다. 권력을 한 가문에 집중시키는 것은 고유의 이점이 있습니다. 이 가문은 권력을 가져다주며, 군주는 국민들에게 영감을 불어넣는 데 능숙합니다.§!"
 IP_fundamentalist_symbol_desc_delayed: "§L근본주의자들은 급진적이거나 초보수적인 형태의 이슬람교를 따르는 강경 보수파입니다. 이들의 주요 목표는 그러한 보수적인 관점을 다른 국가로 전파하는 것입니다.§!"
