 UNSC.200.t: "Попытка поколебать [?sway_target.GetName]"
 UNSC.200.d: "Чтобы добиться желаемого результата по этой §Bрезолюции Совета Безопасности§! §Y ООН§!, нам нужно, чтобы больше людей либо проголосовали за нас, либо воздержались от голосования. Чтобы заставить их изменить свою позицию, мы должны предложить им что-то взамен. У нас есть несколько вариантов, но сейчас мы должны выбрать один и надеяться, что они его примут."
 UNSC.200.a: "Предлагайте торговые и инвестиционные предложения"
 UNSC.200.b: "Предлагайте финансовые стимулы"
 UNSC.200.c: "Предлагать военные стимулы"
 UNSC.200.e: "Предлагайте Стимулы для развития"
 UNSC.201.t: "[FROM.GetName] Хотим повлиять на результаты голосования"
 UNSC.201.d: "[FROM.GetLeader] Они осторожно обратились к [THIS.GetLeader] с просьбой изменить наш голос на [vote_change_too] в текущей резолюции Совета Безопасности ООН.  Они предложили заключить с нами торговые соглашения и договоры о взаимных инвестициях, а также отменить все эмбарго и блокады, если мы согласимся изменить свой голос.  Мы должны решить, стоит ли соглашаться на их просьбу и менять свою позицию в Совете Безопасности."
 UNSC.201.a: "Принимаю их предложение"
 UNSC.201.b: "Отвергните это возмутительное требование!"
 UNSC.202.t: "[FROM.GetName] Хотим повлиять на результаты голосования"
 UNSC.202.d: "[FROM.GetLeader] Они осторожно обратились к [THIS.GetLeader] с просьбой изменить наш голос на [vote_change_too] в текущей резолюции Совета Безопасности ООН.  Они предложили выплатить нам 0,25 % нашего ВВП в качестве единовременной выплаты, если мы согласимся изменить свой голос, и деньги будут выплачены после того, как мы изменим свою позицию.  Мы должны решить, стоит ли соглашаться на их просьбу и менять свою позицию в Совете Безопасности."
 UNSC.202.a: "Принимаю их предложение"
 UNSC.202.b: "Отвергните это возмутительное требование!"
 UNSC.203.t: "[FROM.GetName] Хотим повлиять на результаты голосования"
 UNSC.203.d: "[FROM.GetLeader] Они незаметно обратились к [THIS.GetLeader] с просьбой изменить наше голосование по текущей резолюции Совета Безопасности ООН на [vote_change_too] .  Они предложили предоставить нам доступ к военным, авиационным и спутниковым системам, если мы согласимся изменить свое голосование. Доступ будет предоставлен после того, как мы изменим свое решение.  Мы должны решить, стоит ли соглашаться на их просьбу и менять свою позицию в Совете Безопасности."
 UNSC.203.a: "Принимаю их предложение"
 UNSC.203.b: "Отвергните это возмутительное требование!"
 UNSC.204.t: "[FROM.GetName] Хотим повлиять на результаты голосования"
 UNSC.204.d: "[FROM.GetLeader] спокойно обратился к нам с [THIS.GetLeader]просьбой изменить наш голос на [vote_change_too] за текущую резолюцию Совета Безопасности Организации Объединенных Наций. Они предложили предоставить нам субсидии на исследования, строительство и производство, а также помощь, если мы согласимся изменить наш голос, который будет предоставлен после изменения голоса. Мы должны решить, стоит ли согласие на их просьбу того, чтобы изменить нашу позицию в Совете Безопасности."
 UNSC.204.a: "Принимаю их предложение"
 UNSC.204.b: "Отвергните это возмутительное требование!"
