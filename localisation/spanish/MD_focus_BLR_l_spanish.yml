 uniate_church: "Iglesia Uniate"
 uniate_church_desc: "La Iglesia Uniate es una unión de las tradiciones ortodoxa y católica, que acepta la primacía de Roma pero conserva los ritos ortodoxos orientales. Una primera unión se concretó en el Concilio de Florencia en 1439, pero pronto se disolvió. Desde finales del siglo XV, los señores feudales polacos revivieron la idea, ya que gran parte de la población de Polonia y Lituania seguía siendo ortodoxa, y una unión eclesiástica ofrecía un medio para atraer gradualmente a ucranianos y bielorrusos hacia el catolicismo. Algunos clérigos y nobles ortodoxos apoyaron la unión en el siglo XVI, buscando obtener derechos iguales a los de los católicos. En 1595, los obispos Hypatius Potei de Vladimir-Volyn y Kirill Terletsky de Lutsk apelaron al papa para que se produjera la unión. En el Concilio de Brest de 1596, seis obispos proclamaron la Unión de Brest a pesar de las protestas de la mayoría del clero y la población. El rey respaldó la unión y declaró ilegal a la Iglesia Ortodoxa, transfiriendo sus propiedades a la Iglesia Uniate. En el siglo XVII, se fundó la Orden de los Basilianos para promover la unión junto con los jesuitas. Con el tiempo, la Iglesia Uniate se fue acercando cada vez más a la liturgia católica; las vestimentas, el diseño del templo y la práctica litúrgica se modificaron, y se abolieron las festividades ortodoxas. Estos cambios se codificaron en el Sínodo de Zamosc en 1720. En Transcarpatia, la unión se proclamó en la Catedral de Uzhhorod en 1649 y se consolidó plenamente a finales del siglo XVIII. La resistencia a la unión en defensa de las libertades religiosas y nacionales en Ucrania y Bielorrusia durante los siglos XVI y XVII fue liderada principalmente por hermandades ortodoxas."
 BLR_church_reforms: "Reforma de la Iglesia"
 BLR_church_reforms_desc: "Nuestro estado debería abandonar la religión ortodoxa, patrocinada desde Moscú. Es hora de revivir el uniatismo en nuestra tierra."
 BLR_separate_rel: "Separación de la religión y el estado"
 BLR_state_rel: "Unidad del estado y la religión"
 BLR_church_separate: "Separación de la religión"
 BLR_church_separate_desc: "La religión no debe interferir en los asuntos de Estado y debe servir únicamente como apoyo para nuestra sociedad."
 BLR_church_state: "Religión de Estado"
 BLR_church_state_desc: "La religión debe guiar activamente los asuntos de Estado; de lo contrario, estamos condenados a la decadencia espiritual."
 BLR_Increase_funding_Police: "Aumentar la financiación policial"
 BLR_Increase_funding_Police_desc: "Los acontecimientos recientes han demostrado la necesidad de aumentar la financiación del Ministerio del Interior y sus diversos departamentos."
 BLR_riot_finance: "§1Financiamiento de la policía antidisturbios§!"
 BLR_riot_finance_desc: "Nuestras unidades antidisturbios deben estar equipadas con el mejor material disponible. No debemos escatimar fondos en este aspecto."
 BLR_MVD: "Ministerio del Interior"
 BLR_MVD_desc: "Órgano de la administración estatal de Belarús, que dirige el sistema de órganos de asuntos internos y tropas internas del Ministerio del Interior, llevando a cabo, dentro de sus competencias, la regulación y gestión en el ámbito de la lucha contra la delincuencia, la protección del orden público, la garantía de la seguridad pública y la coordinación de las actividades en este ámbito de otros órganos republicanos de la administración estatal."
 BLR_Internal_troops: "Tropas Internas"
 BLR_Internal_troops_desc: "Organización militar estatal de Bielorrusia que protege los derechos de los ciudadanos, el sistema constitucional, la seguridad y la soberanía de la República de Bielorrusia frente a injerencias criminales."
 BLR_kgb_expand: "Comité de Seguridad del Estado"
 BLR_kgb_expand_desc: "Autoridad ejecutiva estatal de Bielorrusia y un servicio especial destinado a proteger la independencia y la integridad territorial de la República de Bielorrusia, el orden constitucional y la soberanía estatal del Estado bielorruso, así como a garantizar la seguridad nacional en los ámbitos político, económico, militar, científico, tecnológico, informativo, social, demográfico y medioambiental, y a llevar a cabo operaciones de contrainteligencia e inteligencia exterior."
 BLR_new_equipment_omon: "§1Unidad Especial - Alpha§!"
 BLR_new_equipment_omon_desc: "El Grupo \"A\" (\"Alpha\"), dependiente del Comité de Seguridad del Estado de la República de Bielorrusia, es una unidad antiterrorista del KGB bielorruso y una de las fuerzas especiales más secretas de las fuerzas del orden del país. Los miembros de Alpha participan en actividades operativas y de combate llevadas a cabo por unidades del KGB relacionadas con la detención de sospechosos de espionaje, toma de rehenes, narcotráfico, contrabando, tráfico ilegal de armas y sustancias radiactivas, extorsión y migración ilegal."
 BLR_Countering_Cybercrime: "Dirección General de Lucha contra la Ciberdelincuencia"
 BLR_Countering_Cybercrime_desc: "Los ciberdelitos también deben estar bajo nuestra supervisión."
 BLR_Increase_funding_Almaz: "§1Unidad Especial - ALMAZ§!"
 BLR_Increase_funding_Almaz_desc: "La Unidad Especial Almaz para la Lucha contra el Terrorismo es una unidad especial antiterrorista del Ministerio del Interior de Bielorrusia que lleva a cabo diversas tareas para prevenir y responder a actos terroristas. Depende directamente del Ministro del Interior de la República de Bielorrusia. Según informes de los medios de comunicación, la unidad también participa en la represión de la oposición política y en la dispersión de protestas masivas."
 BLR_military_police_training: "§1Entrenamiento de la Policía Militar§!"
 BLR_military_police_training_desc: "Debemos estar preparados para protestas y disturbios masivos en nuestro país, ya que pueden ser instigados desde el extranjero. Nuestros agentes de policía deben estar bien capacitados para reprimir dichos disturbios."
 BLR_peoples_security: "§1El control está en todas partes§!"
 BLR_peoples_security_desc: "Debemos aprovechar los avances técnicos del siglo XXI para mejorar la vigilancia de la población, por supuesto, en aras de su seguridad."
 BLR_procurement_of_espionage_equipment: "§1Adquisición de Equipos de Espionaje§!"
 BLR_procurement_of_espionage_equipment_desc: "En lugar de gastar en cámaras costosas, es mejor equipar a nuestras valientes fuerzas del orden con el equipo adecuado, lo que nos permitirá localizar rápidamente a cualquiera que nos desagrade."
 BLR_occupation_management_strategies: "Intimidar y dominar"
 BLR_occupation_management_strategies_desc: "Antes de atreverse a derrocar al gobierno legítimo, todos lo pensarán tres veces, porque todos saben perfectamente que nada bueno les espera a quienes caen en manos de nuestros servicios especiales."
 BLR_fin_snipes: "§1Sako TRG§!"
