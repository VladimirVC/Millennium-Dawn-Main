l_english:
 PER_iran_first: "Iran First"
 AFG_graveyard_of_empires: "Graveyard of Empires"
 AFG_graveyard_of_empires_desc: "Empires come and go, but our people remain the undisputed masters of this region. So long as our people remain unified and connected to their heritage, any aggressor will find [AFG.GetNameWithFlag] to truly be their graveyard."
 PER_iran_first_desc: "Although we have regional and international allies, we must prioritize Iran first when it comes to the wellbeing of our people. Money must be allocated to develop local industries."
