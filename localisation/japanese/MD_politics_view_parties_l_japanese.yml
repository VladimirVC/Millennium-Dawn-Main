 SPR.Monarchist_carlists_icon: "£SPR_carlists"
 SPR.Monarchist_carlists_desc: "君主主義 - カリルスタは伝統主義的・正統主義的思想「カルロス主義」の支持者であり、ブルボン＝パルマ家を王位に復帰させることを目指している。\n"
